<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
  <div class="nav-container">
    <a href="#" class="logo">RETRO<span>VAULT</span></a>
    
    <ul class="nav-links">
      <li><a href="#" class="active">Search</a></li>
      <li><a href="#">Platforms</a></li>
      <li><a href="#">Compare</a></li>
      <li><a href="#">Wishlist</a></li>
    </ul>
  </div>
</nav>
<div class="title-container">
  <h1 class="website-title">discover your favorite games!</h1>
  <p class="website-subtitle">Explore, Compare and Save - From Modern to Retro Games</p>
</div>
<div id="search-box-container">
  <input type="text" placeholder="Search for your favorite games, platform, or genres" id="search-box">
  <div id="search-btn">🔍</div>
</div>
<div class="hero-section">
  <div class="checkbox-container">
    <div class="platforms">
      <h3 class="platformsHeading">PLATFORMS</h3>
      <input id="PS" type="radio" name="Platform" value="18">
      <label for="PS">Playstation</label><br>
      <input id="Nintendo" type="radio" name="Platform" value="83">
      <label for="Nintendo">Nintendo</label><br>
      <input id="PC" type="radio" name="Platform" value="4">
      <label for="PC">PC</label><br>
    </div>
    <div class="genres">
      <h3 class="genresHeading">GENRES</h3>
        <input id="action" type="radio" name="genre" value="action">
        <label for="action">Action</label><br>
        <input id="strategic" type="radio" name="genre" value="strategic">
        <label for="strategic">Strategic</label><br>
        <input id="adventure" type="radio" name="genre" value="adventure">
        <label for="adventure">Adventure</label><br>
    </div>
    <div class="year-slider">
        <label for="year-slider">YEAR</label><br>
        <input id="year-slider" type="range" name="year" min="1990" max="2026">
    </div>
  </div>
  <div class="cards-container">
    <!-- <div id="card1" class="card">
      <button class="wishlist-btn">Add to wishlist</button>
      <button class="compare-stats">Compare stats</button>
    </div> -->
    
  </div>
</div>
    <script src="index.js"></script>
</body>
</html>
